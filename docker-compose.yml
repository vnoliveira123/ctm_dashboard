services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: log_dashboard
      POSTGRES_PASSWORD: log_dashboard_password
      POSTGRES_DB: log_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U log_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://log_dashboard:log_dashboard_password@postgres:5432/log_dashboard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./csv_input:/app/csv_input
    working_dir: /app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m etl.worker
    environment:
      DATABASE_URL: postgresql://log_dashboard:log_dashboard_password@postgres:5432/log_dashboard
      REDIS_URL: redis://redis:6379/0
      CSV_INPUT_PATH: /app/csv_input
      ETL_SCHEDULE_HOUR: "2"
      ETL_SCHEDULE_MINUTE: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./csv_input:/app/csv_input
    working_dir: /app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app

volumes:
  postgres_data:
